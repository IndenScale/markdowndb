name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Update versions
        run: |
          # Update versions using npm pkg set (avoids npm version workspace issues)
          npm pkg set version=${{ inputs.version }} --workspace=packages/core
          npm pkg set version=${{ inputs.version }} --workspace=packages/sdk
          npm pkg set version=${{ inputs.version }} --workspace=packages/cli

      # Publish in dependency order: core -> sdk -> cli
      # Bun automatically replaces workspace: protocol with actual versions

      - name: Publish @mddb/core
        run: bun publish --access public
        working-directory: packages/core
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mddb/sdk
        run: bun publish --access public
        working-directory: packages/sdk
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mddb/cli
        run: bun publish --access public
        working-directory: packages/cli
        env:
          NPM_CONFIG_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag v${{ inputs.version }}
          git push && git push --tags
