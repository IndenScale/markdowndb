name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Prepare dependencies
        run: |
          # Replace workspace:* with actual version for npm compatibility
          sed -i 's/"workspace:\*"/"^${{ inputs.version }}"/g' packages/cli/package.json
          npm pkg set dependencies.@mddb/core=${{ inputs.version }} --workspace=packages/sdk
          npm pkg set dependencies.@mddb/core=${{ inputs.version }} --workspace=packages/cli
          npm pkg set dependencies.@mddb/sdk=${{ inputs.version }} --workspace=packages/cli

      - name: Update versions
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=packages/core
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=packages/sdk
          npm version ${{ inputs.version }} --no-git-tag-version --workspace=packages/cli

      - name: Setup Node.js for NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Publish @mddb/core
        run: npm publish --access public --workspace=packages/core
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mddb/sdk
        run: npm publish --access public --workspace=packages/sdk
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mddb/cli
        run: npm publish --access public --workspace=packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag v${{ inputs.version }}
          git push && git push --tags
