name: Publish to NPM

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g., 0.1.0)'
        required: true
        type: string

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build packages
        run: bun run build

      - name: Setup Node.js for NPM
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Prepare @mddb/sdk dependencies
        working-directory: packages/sdk
        run: npm pkg set dependencies.@mddb/core=${{ inputs.version }}

      - name: Prepare @mddb/cli dependencies
        working-directory: packages/cli
        run: |
          npm pkg set dependencies.@mddb/core=${{ inputs.version }}
          npm pkg set dependencies.@mddb/sdk=${{ inputs.version }}

      - name: Publish @mddb/core
        working-directory: packages/core
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mddb/sdk
        working-directory: packages/sdk
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @mddb/cli
        working-directory: packages/cli
        run: |
          npm version ${{ inputs.version }} --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Commit version updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/*/package.json
          git commit -m "chore: bump version to ${{ inputs.version }}"
          git tag v${{ inputs.version }}
          git push && git push --tags
